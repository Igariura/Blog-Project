name: Build and Deploy Blog Project

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Step 3 — Build and push API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            lildickey10719/blog-api:latest
            lildickey10719/blog-api:${{ github.sha }}

      # Step 4 — Build and push Frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            lildickey10719/blog-frontend:latest
            lildickey10719/blog-frontend:${{ github.sha }}
      # Step 5 — Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/blog-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/blog-frontend:latest

            # Go to project folder
            cd ~/blog-project

            # Stop current containers
            docker-compose down

            # Start with new images
            docker-compose up -d

            # Clean up old images
            docker image prune -f